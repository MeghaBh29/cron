name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 2:30 AM UTC
  workflow_dispatch:         # Allows you to trigger it manually too

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run step for 21f1000341@ds.study.iitm.ac.in
        run: echo "Running daily commit step for 21f1000341@ds.study.iitm.ac.in"

      - name: Make a daily update
        run: |
          echo "Last automated update: $(date)" >> daily-log.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date)"
          git push
